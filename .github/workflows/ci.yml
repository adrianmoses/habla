name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: apache/age:release_PG18_1.7.0
        env:
          POSTGRES_USER: hable_ya
          POSTGRES_PASSWORD: hable_ya
          POSTGRES_DB: hable_ya
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hable_ya"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      # Skip the `finetune` extra: torch/unsloth are multi-GB and are only
      # needed for model training, which runs in notebooks, not CI.
      - name: Install deps (eval + dev extras)
        run: uv sync --extra eval --extra dev

      - name: Download Spanish spaCy model
        run: uv run python -m spacy download es_core_news_sm

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -U hable_ya; then
              exit 0
            fi
            sleep 1
          done
          echo "Postgres did not become ready in 30s" >&2
          exit 1

      # Ruff runs over the whole of hable_ya/api/eval-agent/tests/scripts. Mypy
      # is kept to the strictly-typed source (hable_ya, api, eval/agent) — tests
      # and utility scripts are best-effort-typed (see pyproject overrides) and
      # are exercised by pytest, so they aren't type-gated here. Directory
      # targets (not a hand-maintained file list) so the job doesn't rot as
      # files are added/renamed/removed.
      - name: Ruff
        run: uv run ruff check hable_ya/ api/ eval/agent/ tests/ scripts/

      - name: Mypy
        run: uv run mypy hable_ya/ api/ eval/agent/

      - name: Pytest
        env:
          HABLE_YA_DATABASE_URL: postgresql://hable_ya:hable_ya@localhost:5432/hable_ya
        run: uv run pytest tests/ -v

      # NOTE (cloud fork): the old "Replay placement" step ran the on-device
      # llama.cpp band-emission regression (hable-ya spec 049). It's dropped
      # here — replay_placement.py targets a llama.cpp endpoint that no longer
      # exists. A cloud eval-regression gate is #012's job.
